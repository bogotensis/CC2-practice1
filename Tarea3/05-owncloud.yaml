apiVersion: apps/v1
kind: Deployment
metadata:
  name: owncloud
  namespace: owncloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owncloud
  template:
    metadata:
      labels:
        app: owncloud
    spec:
      containers:
        - name: owncloud
          image: docker.io/owncloud/server:latest
          env:
            - name: OWNCLOUD_DOMAIN
              value: "docker.ugr.es:20160"
            - name: OWNCLOUD_TRUSTED_DOMAINS
              value: "docker.ugr.es"
            - name: OWNCLOUD_DB_TYPE
              value: "mysql"
            - name: OWNCLOUD_DB_HOST
              value: "mariadb"
            - name: OWNCLOUD_DB_NAME
              value: "owncloud"
            - name: OWNCLOUD_DB_USERNAME
              value: "owncloud"
            - name: OWNCLOUD_DB_PASSWORD
              value: "owncloud"
            - name: OWNCLOUD_ADMIN_USERNAME
              value: "admin"
            - name: OWNCLOUD_ADMIN_PASSWORD
              value: "admin"
            - name: OWNCLOUD_REDIS_ENABLED
              value: "true"
            - name: OWNCLOUD_REDIS_HOST
              value: "redis"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /status.php
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: owncloud-data
              mountPath: /mnt/data
      volumes:
        - name: owncloud-data
          persistentVolumeClaim:
            claimName: owncloud-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: owncloud
  namespace: owncloud
spec:
  type: NodePort
  selector:
    app: owncloud
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30160
